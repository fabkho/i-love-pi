bashToolPatterns:
  # Destructive filesystem
  - pattern: '\brm\s+(-[^\s]*)*-[rRf]'
    reason: rm with recursive or force flags
  - pattern: '\brm\s+--recursive'
    reason: rm --recursive
  - pattern: '\brm\s+--force'
    reason: rm --force
  - pattern: '\bsudo\s+rm\b'
    reason: sudo rm

  # Dangerous git
  - pattern: '\bgit\s+reset\s+--hard\b'
    reason: git reset --hard (use --soft or stash instead)
  - pattern: '\bgit\s+clean\s+(-[^\s]*)*-[fd]'
    reason: git clean -f/-d (discards untracked files)
  - pattern: '\bgit\s+push\s+.*--force(?!-with-lease)'
    reason: git push --force (use --force-with-lease)
  - pattern: '\bgit\s+push\s+(-[^\s]*)*-f\b'
    reason: git push -f (use --force-with-lease)
  - pattern: '\bgit\s+stash\s+clear\b'
    reason: git stash clear (deletes ALL stashes)
  - pattern: '\bgit\s+filter-branch\b'
    reason: git filter-branch (rewrites history)
  - pattern: '\bgit\s+checkout\s+--\s*\.'
    reason: discards all uncommitted changes
    ask: true
  - pattern: '\bgit\s+restore\s+\.'
    reason: discards all uncommitted changes
    ask: true
  - pattern: '\bgit\s+branch\s+(-[^\s]*)*-D\b'
    reason: force-deletes branch (even if unmerged)
    ask: true
  - pattern: '\bgit\s+push\s+\S+\s+--delete\b'
    reason: deletes remote branch
    ask: true

  # Laravel / PHP — database danger
  - pattern: '\bphp\s+artisan\s+migrate:fresh\b'
    reason: migrate:fresh drops all tables and re-runs migrations
    ask: true
  - pattern: '\bphp\s+artisan\s+migrate:reset\b'
    reason: migrate:reset rolls back ALL migrations
    ask: true
  - pattern: '\bphp\s+artisan\s+db:wipe\b'
    reason: db:wipe drops all tables, views, and types
    ask: true
  - pattern: '\bphp\s+artisan\s+migrate:rollback\b'
    reason: rolls back the last migration batch
    ask: true
  - pattern: '\bphp\s+artisan\s+tinker\b'
    reason: opens interactive REPL with full DB access
    ask: true

  # SQL — destructive without scope
  - pattern: 'DELETE\s+FROM\s+\w+\s*;'
    reason: DELETE without WHERE clause — deletes ALL rows
  - pattern: 'DELETE\s+\*\s+FROM'
    reason: DELETE * — deletes ALL rows
  - pattern: '\bTRUNCATE\s+TABLE\b'
    reason: TRUNCATE TABLE — deletes ALL rows
  - pattern: '\bDROP\s+TABLE\b'
    reason: DROP TABLE
  - pattern: '\bDROP\s+DATABASE\b'
    reason: DROP DATABASE
  - pattern: '\bDROP\s+SCHEMA\b'
    reason: DROP SCHEMA

  # System danger
  - pattern: '\bchmod\s+(-[^\s]+\s+)*777\b'
    reason: chmod 777 (world writable)
  - pattern: '\bkill\s+-9\s+-1\b'
    reason: kills all processes
  - pattern: '\bhistory\s+-c\b'
    reason: clears shell history

zeroAccessPaths:
  # Environment / secrets
  - ".env"
  - ".env.local"
  - ".env.production"
  - ".env.staging"
  - ".env.testing"
  - "*.env"
  - "~/.ssh/"
  - "~/.aws/"
  - "~/.gnupg/"
  - "*-credentials.json"
  - "*serviceAccount*.json"
  # Laravel secrets
  - "storage/oauth-private.key"
  - "storage/oauth-public.key"
  # General secrets
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "~/.netrc"
  - "~/.git-credentials"
  - "dump.sql"
  - "backup.sql"
  - "*.dump"

readOnlyPaths:
  # Lock files — never edit manually
  - "composer.lock"
  - "yarn.lock"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "*.lock"
  # Build output
  - "dist/"
  - "build/"
  - ".nuxt/"
  - ".output/"
  - "__pycache__/"
  - "vendor/"
  # Minified assets
  - "*.min.js"
  - "*.min.css"
  # System
  - /etc/
  - /usr/
  - /bin/
  - ~/.bash_history
  - ~/.zsh_history

noDeletePaths:
  # Project fundamentals
  - "AGENTS.md"
  - "README.md"
  - "LICENSE"
  - ".gitignore"
  - ".github/"
  - ".gitlab-ci.yml"
  # Laravel critical
  - "database/migrations/"
  - "config/"
  - "routes/"
  # Docker / CI
  - "Dockerfile"
  - "docker-compose.yml"
  - ".cursor/"
